version = 1
SPDX-PackageName = "mtg_ai"
SPDX-PackageSupplier = "Byron Williams <byronawilliams@gmail.com>"
SPDX-PackageDownloadLocation = "https://github.com/ByronWilliamsCPA/MTG_AI"

# ============================================================================
# BASELINE ANNOTATIONS - Standard paths from template
# ============================================================================

# Source code (Python, TypeScript, tools, tests) - Project License
[[annotations]]
path = [
    "src/**",
    "tools/**",
    "tests/**",
    "validation/**",
    "fuzz/**",
    "benchmarks/**/*.py",
    "scripts/**/*.py",
    "scripts/**/*.sql",
    "migrations/**",
    "modal/**/*.py",
    "*.py",
    "noxfile.py",
    "frontend/src/**",
]
SPDX-License-Identifier = "MIT"
SPDX-FileCopyrightText = "2026 Byron Williams <byronawilliams@gmail.com>"

# Documentation - CC-BY-4.0
[[annotations]]
path = [
    "docs/**",
    "**/*.md",
    "tmp_cleanup/**/*.md",
    "benchmarks/*.md",
    "!LICENSES/*.txt",
]
SPDX-License-Identifier = "CC-BY-4.0"
SPDX-FileCopyrightText = "2026 Byron Williams <byronawilliams@gmail.com>"

# Configuration files - CC0-1.0 (public domain dedication)
[[annotations]]
path = [
    "**/*.toml",
    "**/*.ini",
    "**/*.yml",
    "**/*.yaml",
    "**/*.json",
    ".github/**",
    ".gitignore",
    ".gitattributes",
    ".dockerignore",
    ".editorconfig",
    ".env.example",
    ".mutmut_config",
    ".prettierrc",
    ".shellcheckrc",
    ".yamllint",
    "Dockerfile",
    "*/Dockerfile",
    "requirements/**/*.txt",
    "uv.lock",
    "frontend/.env.example",
    "frontend/.gitignore",
    "frontend/.prettierrc",
    "frontend/eslint.config.js",
    "frontend/index.html",
    "frontend/vite.config.ts",
    "frontend/tsconfig*.json",
    "!LICENSES/*.txt",
]
SPDX-License-Identifier = "CC0-1.0"
SPDX-FileCopyrightText = "2026 Byron Williams <byronawilliams@gmail.com>"

# Data files and models - ODbL-1.0 (Open Database License)
[[annotations]]
path = [
    "data/**",
    "models/**",
]
SPDX-License-Identifier = "ODbL-1.0"
SPDX-FileCopyrightText = "2026 Byron Williams <byronawilliams@gmail.com>"

# Build artifacts and generated files - excluded from licensing
[[annotations]]
path = [
    "build/**",
    "dist/**",
    "site/**",
    "*.egg-info/**",
    "__pycache__/**",
    ".venv/**",
    "venv/**",
    ".nox/**",
    ".mypy_cache/**",
    ".pytest_cache/**",
    ".ruff_cache/**",
    "*.pyc",
    "*.pyo",
]
precedence = "override"
SPDX-License-Identifier = "CC0-1.0"
SPDX-FileCopyrightText = "2026 Byron Williams <byronawilliams@gmail.com>"

# IDE and tooling configuration - CC0-1.0
[[annotations]]
path = [
    ".claude/**",
    ".standards/**",
    ".clusterfuzzlite/**",
    ".sonarlint/**",
    ".qlty/**",
    ".coderabbit.yaml",
    ".vscode/**",
    ".idea/**",
    "renovate.json",
    "sonar-project.properties",
    ".trivyignore",
    "codemeta.json",
    "Makefile",
    "justfile",
    "Taskfile.yml",
    ".secrets.baseline",
]
SPDX-License-Identifier = "CC0-1.0"
SPDX-FileCopyrightText = "2026 Byron Williams <byronawilliams@gmail.com>"

# Temporary, generated, and override files - CC0-1.0
[[annotations]]
path = [
    "tmp_cleanup/**",
    "scripts/**/*.sh",
    "benchmarks/reports/**",
    "notebooks/**/*.ipynb",
    "overrides/**",
    "frontend/public/**",
    "frontend/nginx.conf",
]
SPDX-License-Identifier = "CC0-1.0"
SPDX-FileCopyrightText = "2026 Byron Williams <byronawilliams@gmail.com>"
