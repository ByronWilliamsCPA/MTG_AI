# SonarCloud Analysis
# Runs tests and uploads results to SonarCloud for quality gate evaluation.
# Requires SONAR_TOKEN repository secret from https://sonarcloud.io/account/security
name: SonarCloud

on:
  pull_request:
    branches: [main, master, develop]
  push:
    branches: [main, master, develop]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  sonarcloud:
    name: SonarCloud Analysis
    uses: ByronWilliamsCPA/.github/.github/workflows/python-sonarcloud.yml@40ff5b5615e786ee0867e1b9e8f21a4735036e63  # main
    permissions:
      contents: read
      pull-requests: write
    with:
      sonar-organization: 'byronwilliamscpa'
      sonar-project-key: 'ByronWilliamsCPA_MTG_AI'
      coverage-paths: 'coverage.xml'
      source-directory: 'src'
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
