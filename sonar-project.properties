sonar.projectKey=ByronWilliamsCPA_MTG_AI
sonar.organization=byronwilliamscpa

# Project metadata
sonar.projectName=MTG AI
sonar.projectVersion=0.1.0

# Source and test directories
sonar.sources=src
sonar.tests=tests
sonar.python.version=3.12

# Coverage report (generated by pytest-cov)
sonar.python.coverage.reportPaths=coverage.xml

# Exclusions
sonar.exclusions=\
  **/__pycache__/**,\
  **/*.pyc,\
  **/.venv/**,\
  **/node_modules/**,\
  **/dist/**,\
  **/build/**,\
  docs/**,\
  scripts/**

# Test file patterns
sonar.test.inclusions=tests/**/*.py
