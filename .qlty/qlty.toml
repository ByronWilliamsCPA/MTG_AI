# Qlty configuration for MTG AI
# Generated to match the working qlty.sh plugin format.
# Reference: https://qlty.sh/d/qlty-toml
config_version = "0"

exclude_patterns = [
  "*_min.*",
  "*-min.*",
  "*.min.*",
  "**/.yarn/**",
  "**/*.d.ts",
  "**/assets/**",
  "**/bower_components/**",
  "**/build/**",
  "**/cache/**",
  "**/dist/**",
  "**/node_modules/**",
  "**/.venv/**",
  "**/venv/**",
  "**/__pycache__/**",
  "**/*.pyc",
  "**/*.pyo",
  "**/.pytest_cache/**",
  "**/.ruff_cache/**",
  "**/.mypy_cache/**",
  "**/*.egg-info/**",
]

test_patterns = [
  "**/tests/**",
  "**/test/**",
  "**/spec/**",
  "**/*.test.*",
  "**/*.spec.*",
  "**/*_test.*",
  "**/test_*.*",
]

[smells]
mode = "comment"

[[source]]
name = "default"
default = true

[[plugin]]
name = "ruff"

[[plugin]]
name = "bandit"
# Restrict to production source code only; qlty's bandit shim does not read
# pyproject.toml exclude paths, so scope must be set here.
prefix = "src/"
