# Alembic configuration with two independent lineages.
#
# The data and app domains each have their own script_location, version table,
# and schema (see ADR-001), so their histories never collide. Run them with the
# named sections:
#
#   alembic -c alembic.ini -n data upgrade head
#   alembic -c alembic.ini -n app  upgrade head
#
# Connection URLs are taken from application settings inside each env.py
# (MTG_AI_DATA_DATABASE_URL for data, MTG_AI_DATABASE_URL for app); they are not
# duplicated here.

[alembic]
# Default section points at the app lineage for bare `alembic` invocations.
script_location = migrations/app
prepend_sys_path = .

[data]
script_location = migrations/data
prepend_sys_path = .

[app]
script_location = migrations/app
prepend_sys_path = .

# Logging configuration.
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
